<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SCALP — Dashboard</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <span id="online" class="dot"></span>
      <div class="chip"><strong id="bitget">Bitget: —</strong><small id="bitget-ts"></small></div>
      <div class="chip">Risque</div>
      <div id="riskBtns" class="btns">
        <button class="btn" data-risk="1">1</button>
        <button class="btn active" data-risk="2">2</button>
        <button class="btn" data-risk="3">3</button>
      </div>
    </div>

    <div id="msg" class="msg"></div>

    <div class="panel">
      <h1>Heatmap (pair × TF)</h1>
      <div class="muted">Pastilles BUY/SELL/HOLD + score (BUY=+1, SELL=−1, HOLD=0, somme sous-strat).</div>
      <table>
        <thead>
          <tr><th>Pair \ TF</th><th>1m</th><th>5m</th><th>15m</th></tr>
        </thead>
        <tbody id="heatBody"><tr><td colspan="4" class="empty">Chargement…</td></tr></tbody>
      </table>
    </div>

    <div class="panel">
      <h2>Derniers signaux</h2>
      <table>
        <thead><tr><th>UTC</th><th>Symbol</th><th>TF</th><th>Signal</th><th>Détails</th></tr></thead>
        <tbody id="lastBody"><tr><td colspan="5" class="empty">Les HOLD sont masqués.</td></tr></tbody>
      </table>
    </div>

    <div class="panel">
      <h2>Positions</h2>
      <table>
        <thead><tr><th>Ouverture</th><th>Symb</th><th>Side</th><th>Qty</th><th>Entrée</th><th>Sortie</th><th>PNL</th></tr></thead>
        <tbody id="posBody"><tr><td colspan="7" class="empty">—</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Overlay détails -->
  <div id="detailPanel">
    <div class="dp-head">
      <strong id="dp-title">Sous-stratégies</strong>
      <span id="dp-close" title="Fermer">✕</span>
    </div>
    <div id="dp-content"></div>
  </div>

  <script src="/app.js" defer></script>
</body>
</html>
