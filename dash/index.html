<!doctype html><html lang="fr"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scalp Dashboard</title>
<style>
:root{--bg:#0b0f17;--card:#111827;--text:#e6eef8;--muted:#9fb4d9;--line:#233049;--btn:#2d6cdf;--btn-active:#1db954}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif}
.wrap{max-width:1200px;margin:10px auto;padding:10px}
.top{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.title{font-weight:900;font-size:28px;margin-right:8px}
.pill{display:inline-flex;gap:6px;align-items:center;background:#0f1624;border-radius:12px;padding:6px 8px}
.chip{background:var(--btn);color:#fff;border:none;border-radius:14px;padding:6px 10px;font-weight:700;opacity:.95;cursor:pointer}
.chip.muted{background:var(--muted);color:#0b0f17}
.chip.active{background:var(--btn-active)}
.meta{color:var(--muted);font-size:12px;margin-left:auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:14px}
h2{margin:0 0 12px 0}
table{width:100%;border-collapse:collapse}
th,td{padding:6px 4px;border-bottom:1px solid #0f1624}
th{color:var(--muted);text-transform:lowercase}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.tile{background:#1a2638;border:1px solid #0f2033;border-radius:10px;padding:16px;text-align:center}
.tile strong{display:block;font-size:18px;margin-bottom:6px}
.tile small{color:#9ec0a9}
@media (min-width:700px){.grid{grid-template-columns:repeat(6,minmax(0,1fr));}}
</style>
</head><body><div class="wrap">
<!-- FRONT v3.12 -->
<div class="top">
  <div class="title">Scalp</div>

  <!-- Bouton unique Paper/Réel -->
  <div class="pill">
    <button class="chip js-mode">Paper</button>
  </div>

  <!-- Risque 1/2/3 -->
  <div class="pill">
    <button class="chip js-lvl active" data-lvl="1">1</button>
    <button class="chip js-lvl" data-lvl="2">2</button>
    <button class="chip js-lvl" data-lvl="3">3</button>
  </div>

  <!-- Statut -->
  <div class="meta js-status">—</div>
</div>

<div class="card">
  <h2>Signaux récents</h2>
  <table><thead><tr>
    <th>ts</th><th>sym</th><th>side</th><th>score</th><th>qty</th><th>sl</th><th>tp</th>
  </tr></thead><tbody class="js-signals"></tbody></table>
</div>

<div class="card">
  <h2>Positions</h2>
  <table><thead><tr>
    <th>ts</th><th>id</th><th>sym</th><th>side</th><th>entry</th><th>qty</th>
  </tr></thead><tbody class="js-positions"></tbody></table>
</div>

<div class="card">
  <h2>Watchlist — Heatmap</h2>
  <div class="grid js-heat"></div>
</div>

<script src="/app.js?v=3.12"></script>
</div></body></html>y
