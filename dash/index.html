<!doctype html><html lang="fr"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scalp</title>
<style>
:root{--bg:#0b0f17;--card:#111827;--text:#e6eef8;--muted:#9fb4d9;--line:#233049;--btn:#2d6cdf;--btn-active:#1db954}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif}
.wrap{max-width:1200px;margin:10px auto;padding:10px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
.h1{font-size:26px;font-weight:900}
.pill{display:inline-flex;gap:6px;align-items:center;background:#0f1624;padding:6px;border-radius:12px}
.btn{background:var(--btn);color:#fff;border:none;border-radius:10px;height:36px;padding:0 12px;font-weight:800}
.btn.muted{background:#0f1624;color:var(--muted)}
.btn.active{background:var(--btn-active)}
.meta{color:var(--muted);font-size:12px}
.hr{height:1px;background:var(--line);margin:8px 0}
.grid{display:grid;gap:10px}
@media(min-width:760px){.grid{grid-template-columns:repeat(5,1fr)}}
@media(max-width:759px){.grid{grid-template-columns:repeat(4,1fr)}}
.tile{background:#15321e;border:1px solid #204232;border-radius:10px;padding:10px;text-align:center}
.tile .sym{font-weight:800}
.tile .score{margin-top:6px;font-size:12px;color:#bfe6c7}
.table{width:100%;border-collapse:collapse}
th,td{padding:6px;border-bottom:1px dashed var(--line);font-size:14px}
th{color:var(--muted);text-transform:lowercase}
.right{margin-left:auto}
.small{font-size:12px}
.log{background:#0e1422;border:1px solid #1b2740;border-radius:8px;padding:8px;font-family:ui-monospace,Menlo,monospace;font-size:12px;max-height:120px;overflow:auto}
</style>
</head><body><div class="wrap">
<!-- FRONT v 3.15 -->
<div class="row card">
  <div class="h1">Scalp</div>
  <div class="pill"><button class="btn" id="btnMode">0</button></div>
  <div class="pill">
    <button class="btn muted js-risk" data-k="1">1</button>
    <button class="btn muted js-risk" data-k="2">2</button>
    <button class="btn muted js-risk" data-k="3">3</button>
  </div>
  <div class="right meta">v <span class="js-ver">3.15</span> · <span class="js-ct">3</span>s · <span class="js-mode">PAPER</span></div>
  <div class="row" style="width:100%;margin-top:6px">
    <button class="btn muted js-tab active" data-tab="flux">Flux</button>
    <button class="btn muted js-tab" data-tab="watch">Watchlist</button>
    <button class="btn muted js-tab" data-tab="hist">Historique</button>
    <button class="btn muted js-tab" data-tab="ml">ML</button>
    <button class="btn muted js-tab" data-tab="analyse">Analyse</button>
  </div>
</div>

<div class="card js-view" data-view="flux">
  <div class="h1">Signaux récents</div><div class="hr"></div>
  <table class="table">
    <thead><tr><th>ts</th><th>sym</th><th>side</th><th>score</th><th>qty</th><th>sl</th><th>tp</th></tr></thead>
    <tbody class="js-signals-body"><tr><td colspan="7" class="small meta">—</td></tr></tbody>
  </table>
  <div class="hr"></div>
  <div class="h1">Positions</div><div class="hr"></div>
  <table class="table">
    <thead><tr><th>ts</th><th>id</th><th>sym</th><th>side</th><th>entry</th><th>qty</th></tr></thead>
    <tbody class="js-positions-body"><tr><td colspan="6" class="small meta">—</td></tr></tbody>
  </table>
</div>

<div class="card js-view" data-view="watch" hidden>
  <div class="h1">Watchlist — Heatmap</div><div class="hr"></div>
  <div class="grid js-heat"></div>
</div>

<div class="card js-view" data-view="hist" hidden>
  <div class="h1">Historique</div><div class="meta small">À venir</div>
</div>

<div class="card js-view" data-view="ml" hidden>
  <div class="h1">ML</div><div class="meta small">À venir</div>
</div>

<div class="card js-view" data-view="analyse" hidden>
  <div class="h1">Analyse</div><div class="hr"></div>
  <div class="js-analyse meta">—</div>
</div>

<div class="card"><div class="small meta">Logs</div><div class="log js-log"></div></div>
<script src="/app.js?v=3.15" defer></script>
</div></body></html>
