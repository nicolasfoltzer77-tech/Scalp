<!doctype html><html lang="fr"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scalp Dashboard</title>
<style>
:root{--bg:#0b0f17;--card:#111827;--text:#e6eef8;--muted:#9fb4d9;--line:#233049;--btn:#2d6cdf;--btn-active:#1db954;}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif}
.wrap{max-width:1200px;margin:10px auto;padding:10px}
.topbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.chip{background:var(--btn);color:#fff;border:none;border-radius:14px;padding:8px 14px;font-weight:600;opacity:.9}
.chip.muted{background:var(--muted);color:#0b0f17}
.chip.active{background:var(--btn-active)}
.pill{display:inline-flex;gap:6px;align-items:center;background:#0f1624;padding:8px 12px;border-radius:12px}
.title{font-weight:800;font-size:28px;margin-right:8px}
.meta{color:var(--muted);font-size:12px;margin-left:auto;display:flex;gap:10px;align-items:center}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:14px}
h2{margin:0 0 10px 0;font-size:26px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid var(--line);text-align:left}
th{color:var(--muted);font-weight:700;text-transform:lowercase}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}
.cell{background:#0f1624;border:1px solid #1b2740;border-radius:8px;padding:8px;text-align:center}
.badge{font-size:11px;color:#9fb4d9}
</style>
</head><body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">Scalp</div>

      <button class="chip js-mode-paper">Paper</button>
      <button class="chip muted js-mode-real">Réel</button>

      <div class="pill">
        <button class="chip muted js-risk" data-risk="1">1</button>
        <button class="chip js-risk active" data-risk="2">2</button>
        <button class="chip muted js-risk" data-risk="3">3</button>
      </div>

      <div class="meta">
        <span class="badge js-mode-pill">PAPER</span>
        <span>bal <span class="js-balance">—</span></span>
        <span>maj : <span class="js-refresh">—</span>s</span>
      </div>
    </div>

    <div class="card">
      <h2>Signaux récents</h2>
      <table>
        <thead><tr><th>ts</th><th>sym</th><th>side</th><th>score</th><th>qty</th><th>sl</th><th>tp</th></tr></thead>
        <tbody class="js-signals-body"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Positions</h2>
      <table>
        <thead><tr><th>ts</th><th>id</th><th>sym</th><th>side</th><th>entry</th><th>qty</th></tr></thead>
        <tbody class="js-positions-body"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Watchlist — Heatmap</h2>
      <div class="grid js-heatmap"></div>
    </div>
  </div>

  <!-- version injectée -->
  <script src="/app.js?v=3.11" defer></script>
</body></html>
