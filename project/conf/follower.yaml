follower:

  # ==========================================================
  # LOOP / ENGINE
  # ==========================================================
  poll_interval_sec: 1
  max_trade_age_s: 1800

  # ==========================================================
  # BREAK EVEN (SAFE ARMING)
  # ==========================================================
  sl_be_atr_trigger: 0.25
  sl_be_offset_atr: 0.08
  protect_cost_floor_ratio: 0.0012

  # ==========================================================
  # TRAILING STOP
  # ==========================================================
  sl_trail_atr_trigger: 0.60
  sl_trail_offset_atr: 0.75
  sl_trail_min_step_s: 15

  # ==========================================================
  # RISK — SIMPLE / INDEPENDANT DE LA PYRAMIDE
  # ==========================================================
  sl_hard_atr_mult: 1.2
  tp_dyn_atr_mult: 1.80
  risk_near_ratio: 0.00

  # ==========================================================
  # PYRAMIDING — BASE
  # ==========================================================
  pyramide_atr_trigger: 0.25
  pyramide_cooldown_s: 8
  pyramide_qty_ratio: 0.30
  pyramide_base_qty_pct: 40
  pyramide_max_adds: 12
  pyramide_atr_step: 0.15
  pyramide_mfe_step: 0.15
  pyramide_require_progress_since_last: true
  min_mae_forbid_pyramide: 1.5

  # pyr1=0.45 ATR, pyr2=0.70 ATR, pyr3=0.95 ATR, etc (+0.25 ATR)

  # ==========================================================
  # PARTIAL TAKE PROFIT
  # ==========================================================
  partial_mfe_atr: 1.60
  tp_dyn_atr_trigger: 2.00
  partial_close_ratio: 0.15
  partial_base_qty_pct: 30
  min_partial_qty: 0.0

  # ==========================================================
  # TIMEOUTS / KEEP-ALIVE  (REPO CANON)
  # ==========================================================
  min_mfe_keep_atr: 0.20
  max_no_mfe_age_s: 180

  timeout_no_move_atr: 0.10
  timeout_no_move_s: 180

  timeout_drawdown_atr: 0.80
  timeout_drawdown_s: 240

  # ==========================================================
  # SAFETY / FILTERS
  # ==========================================================
  min_qty_open: 0.0
  forbid_pyramide_if_negative_pnl: false
  forbid_partial_if_negative_pnl: false
