<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SCALP rtviz-ui</title>
<link rel="stylesheet" href="/assets/app.css">
</head>
<body>
  <div class="top">
    <h1>SCALP <span id="ui">rtviz-ui</span></h1>
    <button id="btnRefresh">Mettre à jour</button>
  </div>

  <!-- Légende + tableau principal (déjà connu) -->
  <div id="grid" class="card">
    <div class="legend">
      <span class="dot green"></span>fresh
      <span class="dot orange"></span>reloading
      <span class="dot red"></span>stale
      <span class="dot gray"></span>absent
    </div>
    <div id="table" class="grid"></div>
    <div id="errmsg" class="msg error">Impossible de charger les données.</div>
  </div>

  <!-- NEW : Derniers JSON de /opt/scalp/data -->
  <div class="card" style="margin-top:16px">
    <h3 style="margin:0 0 8px 0">Derniers .json dans <code>/opt/scalp/data</code> (auto 10s)</h3>
    <table style="width:100%;border-collapse:collapse">
      <thead>
        <tr style="opacity:.8;border-bottom:1px solid #2a3a52">
          <th style="text-align:left;padding:6px 4px">Fichier</th>
          <th style="text-align:left;padding:6px 4px">Modifié</th>
          <th style="text-align:right;padding:6px 4px">Taille</th>
        </tr>
      </thead>
      <tbody id="lastjson" style="font-family:ui-monospace,monospace"></tbody>
    </table>
    <div id="lastjson-empty" class="msg" style="display:none">Aucun fichier .json trouvé.</div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
