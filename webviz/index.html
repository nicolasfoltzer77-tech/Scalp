<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SCALP rtviz-ui 1.0.1</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <script src="app.js"></script>
</head>
<body class="has-background-dark has-text-light">
<section class="section">
  <div class="container">
    <h1 class="title has-text-light">SCALP <small>rtviz-ui 1.0.1</small></h1>

    <div class="tabs is-toggle is-toggle-rounded">
      <ul>
        <li id="tab-flux"><a onclick="showTab('flux')">Flux</a></li>
        <li id="tab-heatmap"><a onclick="showTab('heatmap')">Heatmap</a></li>
        <li id="tab-hist"><a onclick="showTab('hist')">Historique</a></li>
        <li id="tab-data"><a onclick="showTab('data')">Data</a></li>
      </ul>
    </div>

    <div id="content-flux" class="content">…</div>
    <div id="content-heatmap" class="content is-hidden">…</div>
    <div id="content-hist" class="content is-hidden">…</div>

    <div id="content-data" class="content is-hidden">
      <h2 class="subtitle has-text-light">Statut des données</h2>
      <table class="table is-fullwidth is-striped is-hoverable has-background-dark has-text-light">
        <thead>
          <tr><th>Symbole</th><th>TF</th><th>État</th></tr>
        </thead>
        <tbody id="data-body"></tbody>
      </table>
    </div>
  </div>
</section>
</body>
</html>
