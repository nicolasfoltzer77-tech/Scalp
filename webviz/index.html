<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SCALP rtviz-ui</title>
<link rel="stylesheet" href="/assets/app.css">
<div class="wrap">
  <header class="top">
    <h1>SCALP <span id="ver">rtviz-ui</span></h1>
    <button id="btn-refresh" class="btn">Mettre à jour</button>
  </header>

  <section class="card">
    <div class="legend">
      <span class="dot green"></span> fresh
      <span class="dot orange"></span> reloading
      <span class="dot red"></span> stale
      <span class="dot gray"></span> absent
    </div>

    <div class="tbl">
      <div class="row head">
        <div>Symbol</div><div>1m</div><div>5m</div><div>15m</div>
      </div>
      <div id="rows"></div>
    </div>

    <div id="err" class="err" hidden>Impossible de charger les données.</div>
  </section>
</div>

<script src="/app.js?v={{ts}}"></script>
