<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SCALP rtviz-ui</title>
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body>
  <header class="hdr">
    <h1>SCALP <span class="muted">rtviz-ui</span> <span id="uiVer">?</span></h1>
    <button id="btnRefresh" class="btn">Mettre à jour</button>
  </header>

  <section class="card">
    <div class="legend">
      <span class="dot green"></span> fresh
      <span class="dot orange"></span> reloading
      <span class="dot red"></span> stale
      <span class="dot gray"></span> absent
    </div>
    <div id="grid" class="grid">Chargement…</div>
    <div id="msg" class="msg"></div>
  </section>

  <script src="/app.js"></script>
</body>
</html>
