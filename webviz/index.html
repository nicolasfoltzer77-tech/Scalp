<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SCALP • rtviz-ui 1.0.0</title>
  <link rel="icon" href="/static/favicon.ico">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="dark">
  <header>
    <h1>SCALP <small>rtviz-ui 1.0.0</small></h1>
    <nav class="tabs">
      <button data-tab="flux" class="active">Flux</button>
      <button data-tab="heatmap">Heatmap</button>
      <button data-tab="history">Historique</button>
      <button data-tab="data">Données</button>
    </nav>
  </header>

  <main>
    <!-- Flux -->
    <section id="tab-flux" class="tab active">
      <div class="card">
        <div class="status"><span id="fluxStatus">Flux : …</span> <code>/signals</code></div>
        <table class="tbl" id="fluxTable">
          <thead><tr><th>ts</th><th>sym</th><th>tf</th><th>side</th><th>score</th><th>entry</th></tr></thead>
          <tbody></tbody>
        </table>
        <div class="err" id="fluxErr" hidden>Erreur de chargement.</div>
      </div>
      <p>Logs : <a href="/logs/">/logs/</a> · Ping : <a href="/hello">/hello</a></p>
    </section>

    <!-- Heatmap -->
    <section id="tab-heatmap" class="tab">
      <div class="card">
        <div class="status"><span id="hmStatus">Heatmap : …</span> <code>/heatmap</code></div>
        <div id="heatmapGrid" class="heatmap"></div>
        <div class="err" id="hmErr" hidden>Erreur de chargement heatmap.</div>
      </div>
    </section>

    <!-- Historique (placeholder) -->
    <section id="tab-history" class="tab">
      <div class="card"><p>À venir : historique et filtres.</p></div>
    </section>

    <!-- Données -->
    <section id="tab-data" class="tab">
      <div class="card">
        <div class="status"><span>État des données</span> <code>/api/data_status</code></div>
        <table class="tbl" id="dataTable">
          <thead><tr><th>symbol_tf</th><th>age (s)</th><th>état</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
