<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>SCALP rtviz-ui</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body{margin:0;background:#0f1318;color:#e6eef8;font:14px/1.2 system-ui,Segoe UI,Roboto,Arial}
  .wrap{max-width:1100px;margin:24px auto;padding:0 16px}
  h1{margin:0 0 12px;font-size:26px}
  #ver{opacity:.7;margin-left:8px;font-size:14px}
  .legend{display:flex;gap:18px;align-items:center;margin:10px 0 14px}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%}
  .green{background:#2da44e}.orange{background:#f2a600}.red{background:#e5534b}.grey{background:#768390}
  table{width:100%;border-collapse:collapse;background:#111722;border-radius:10px;overflow:hidden}
  th,td{padding:8px 10px}       /* ← lignes plus basses */
  thead th{color:#9fb3c8;text-align:left;border-bottom:1px solid #1a2230}
  tbody tr:nth-child(odd){background:#0f141d}
  td.c{text-align:center}
  pre{background:#0f141d;border:1px solid #1a2230;border-radius:10px;padding:12px;overflow:auto}
  .topbar{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:12px}
  .btn{background:#2563eb;color:#fff;border:0;border-radius:10px;padding:10px 14px;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>SCALP rtviz-ui <span id="ver"></span></h1>
    <button id="refresh" class="btn">Mettre à jour</button>
  </div>

  <div class="legend">
    <span class="dot green"></span> fresh
    <span class="dot orange"></span> reloading
    <span class="dot red"></span> stale
    <span class="dot grey"></span> absent
  </div>

  <table id="tbl">
    <thead><tr><th>Symbol</th><th class="c">1m</th><th class="c">5m</th><th class="c">15m</th></tr></thead>
    <tbody></tbody>
  </table>

  <h3 style="margin:18px 4px">Derniers .json dans <code>/opt/scalp/data</code> <small>(auto 10s)</small></h3>
  <pre id="last10">—</pre>
</div>
<script src="/app.js"></script>
</body>
</html>
