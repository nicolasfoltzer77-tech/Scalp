<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>SCALP · rtviz-ui</title>
  <link rel="stylesheet" href="app.css"/>
</head>
<body>
  <header style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px">
    <h1>SCALP <small id="ver" class="muted"></small></h1>
    <button id="btn-refresh">Mettre à jour</button>
  </header>

  <main class="wrap">
    <section id="data-card" class="card">
      <div class="legend">
        <span class="dot green"></span> fresh
        <span class="dot orange"></span> reloading
        <span class="dot red"></span> stale
        <span class="dot gray"></span> absent
      </div>
      <div id="data">Chargement…</div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
