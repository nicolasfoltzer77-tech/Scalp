# engine/config/config.yaml
runtime:
  data_dir: /opt/scalp/data
  reports_dir: /opt/scalp/reports

  # symbols par défaut (fallback si pas de watchlist calculée)
  symbols: ["BTCUSDT","ETHUSDT"]

  # timeframes utilisés par le bot
  tf_list: ["1m","5m","15m"]

  # Watchlist auto (Bitget USDT-Perp "umcbl")
  watchlist:
    max_symbols: 12           # nombre cible (10-15 typique)
    min_volume_usdt: 1_000_000  # seuil volume 24h (USDT)
    vol_window_minutes: 240    # fenêtre pour volatilité (minutes sur 1m)
    weight_volume: 0.6         # pondération score
    weight_vol: 0.4            # pondération score
    include_manual: true       # inclure la liste manuelle

  # Liste manuelle à inclure coûte que coûte
  manual_symbols: ["BTCUSDT", "ETHUSDT"]

  backfill_limit: 2000
  risk_mode: conservative

  exec_enabled: true
  html_port: 8888
